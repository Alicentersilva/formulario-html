<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="formulario.css"
    <title>Cadastro</title>
</head>
<body>
    <div>
        <h1 id="titulo">Cadastro do Aluno</h1>
        <p id="subtitulo">Complete suas informações</p>
        <br>
    </div>

    <form>
        <fieldset class="grupo">
            <div class="campo">
                <label for="nome"><strong>Nome</strong></label>
                <input type="text" name="nome" id="nome" required>
            </div>

            <div class="campo">
                <label for="sobrenome"><strong>Sobrenome</strong></label>
                <input type="text" name="sobrenome" id="sobrenome" required>
            </div>
        </fieldset>

        <div class="campo">
            <label for="email"><strong>Email</strong></label>
            <input type="email" name="email" id="email" required>
        </div>

        <div class="campo">
            <label><strong>Turno</strong></label>
            <label>
                <input type="radio" name="turno" value="Manha" checked>Manhã
            </label>
                    <label>
                <input type="radio" name="turno" value="tarde">Tarde
            </label>
                    <label>
                <input type="radio" name="turno" value="Noite">Noite
            </label>
        </div>

        <div>
            <label for="serie"><strong>Série</strong></label>
            <select id="Série">
                <option selected disabled value="">Selecione</option>
                <option>1º ano</option>
                <option>2º ano</option>
                <option>3º ano</option>
                <option>4º ano</option>
                <option>5º ano</option>
            </select>
        </div>

        <fieldset class="grupo">
            <div id="check">
                <label><strong>Atividades Extracurriculares:</strong></label><br><br>
                <input type="checkbox" id="atividade1" name="atividade1" value="Informatica">
                <label for="atividade1">Informática</label>
                <input type="checkbox" id="atividade2" name="atividade2" value="Musica">
                <label for="atividade2">Música</label>                
                <input type="checkbox" id="atividade3" name="atividade3" value="Balet">
                <label for="atividade3">Balet</label>                
                <input type="checkbox" id="atividade4" name="atividade4" value="Pintura">
                <label for="atividade4">Pintura</label>                
                <input type="checkbox" id="atividade5" name="atividade5" value="Judo">
                <label for="atividade5">Judô</label>
                <input type="checkbox" id="atividade6" name="atividade6" value="futebol">
                <label for="atividade6">Futebol</label>
            </div>
        </fieldset>

        <div class="campo">
            <br>
            <label><strong>Mensagem</strong></label>
            <textarea rows="6" style="width: 26em" id="mensagem" name="mensagem"></textarea>
        </div>

        <button class= "botao" type="submit">Concluído</button>
        
    </form>
</body>
</html>
